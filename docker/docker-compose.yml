version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: marketdata-postgres
    environment:
      POSTGRES_DB: MarketDataDb
      POSTGRES_USER: marketdata_user
      POSTGRES_PASSWORD: StrongPassword123!
      # trust для dev-окружения — Npgsql на Windows через Docker NAT
      # не может корректно выполнить SCRAM-SHA-256 аутентификацию
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - marketdata-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketdata_user -d MarketDataDb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    # Фиксированная версия 3.9.0 — stable KRaft без heartbeat таймаутов,
    # которые наблюдались на apache/kafka:latest (4.2.0)
    image: apache/kafka:3.9.0
    container_name: marketdata-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft mode — без ZooKeeper
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: marketdata-kafka-cluster
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Увеличенные таймауты для стабильности KRaft heartbeat
      KAFKA_BROKER_HEARTBEAT_INTERVAL_MS: 500
      KAFKA_CONTROLLER_SOCKET_TIMEOUT_MS: 60000
      KAFKA_BROKER_SESSION_TIMEOUT_MS: 90000
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - marketdata-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  kafka-init-topics:
    image: apache/kafka:3.9.0
    container_name: marketdata-kafka-init
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Kafka to be ready..."
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list > /dev/null 2>&1; do
          echo "  Kafka not ready yet, sleeping..."
          sleep 3
        done
        echo "Kafka is ready. Creating topics..."
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic raw-ticks --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic aggregated-data --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic connection-events --partitions 1 --replication-factor 1
        echo "Topics created successfully:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    networks:
      - marketdata-network
    depends_on:
      kafka:
        condition: service_healthy

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: marketdata-kafdrop
    ports:
      - "9000:9000"
    environment:
      - KAFKA_BROKERCONNECT=kafka:9092
      - JVM_OPTS=-Xms64m -Xmx128m
      - SERVER_SERVLET_CONTEXTPATH=/
    networks:
      - marketdata-network
    depends_on:
      - kafka
    restart: unless-stopped

volumes:
  postgres_data:
  kafka_data:

networks:
  marketdata-network:
    driver: bridge
